version: 0.2

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 689050397154.dkr.ecr.us-east-1.amazonaws.com
      - REPOSITORY_NAME=rfp-agent
      - IMAGE_TAG=orchestrator-agentcore-arm64-final
      - IMAGE_URI=689050397154.dkr.ecr.us-east-1.amazonaws.com/$REPOSITORY_NAME:$IMAGE_TAG

  build:
    commands:
      - echo "Building Docker image for ARM64..."
      - docker buildx build --platform linux/arm64 -f Dockerfile.arm64 -t $IMAGE_URI --push .

  post_build:
    commands:
      - echo "Build completed on `date`"

artifacts:
  files:
    - '**/*'
